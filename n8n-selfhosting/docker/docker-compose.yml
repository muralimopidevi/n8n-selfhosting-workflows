# ═══════════════════════════════════════════════════════════════════
# n8n Production Stack — Docker Compose
# Services: PostgreSQL 16, Redis 7, n8n (main + worker)
# 
# Prerequisites:
# 1. Copy .env-example to .env
# 2. Generate secure passwords (see .env-example for commands)
# 3. Update N8N_HOST and N8N_WEBHOOK_URL with your domain
# 4. Create volumes directory: mkdir -p ${N8N_VOLUMES_ROOT}
#
# Usage:
# - Start: docker compose up -d
# - Scale workers: docker compose up -d --scale n8n-worker=3
# - Logs: docker compose logs -f
# - Stop: docker compose down
# ═══════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────
# SHARED CONFIGURATION
# ─────────────────────────────────────────────────────────────────
x-n8n-common: &n8n-common
  image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-1.123.28}
  restart: unless-stopped
  networks:
    - n8n_network
  environment:
    # ── Database ──────────────────────────────────────────────────
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
    DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
    DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    DB_POSTGRESDB_SCHEMA: public
    # ── Queue (Redis) ─────────────────────────────────────────────
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: redis
    QUEUE_BULL_REDIS_PORT: 6379
    QUEUE_BULL_REDIS_PASSWORD: ${N8N_REDIS_PASSWORD}
    QUEUE_BULL_REDIS_DB: 0
    # ── Application ───────────────────────────────────────────────
    N8N_HOST: ${N8N_HOST}
    N8N_PORT: 5678
    N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
    WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
    N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
    N8N_TEMPLATES_ENABLED: ${N8N_TEMPLATES_ENABLED:-false}
    # ── Logging ───────────────────────────────────────────────────
    N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
    N8N_LOG_OUTPUT: ${N8N_LOG_OUTPUT:-console}
    # ── Timezone ──────────────────────────────────────────────────
    GENERIC_TIMEZONE: ${N8N_GENERIC_TIMEZONE:-UTC}
    TZ: ${N8N_GENERIC_TIMEZONE:-UTC}
    # ── Task Runners ──────────────────────────────────────────────
    N8N_RUNNERS_ENABLED: "true"
    N8N_RUNNERS_MODE: "internal"
    # ── Security ──────────────────────────────────────────────────
    N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
    # ── Metrics ───────────────────────────────────────────────────
    N8N_METRICS: ${N8N_METRICS:-false}
    N8N_METRICS_PREFIX: n8n_
    # ── Future-proofing (silence deprecation warnings) ───────────────
    OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
    N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
    # ── Proxy ─────────────────────────────────────────────────────
    N8N_PROXY_HOPS: "1"
    # ── Reliability & Timeouts ────────────────────────────────────
    N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "30"
    EXECUTIONS_TIMEOUT: "3600"
    EXECUTIONS_TIMEOUT_MAX: "7200"
    # ── Worker Health ─────────────────────────────────────────────
    QUEUE_HEALTH_CHECK_ACTIVE: "true"
services:

  # ───────────────────────────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: n8n_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${N8N_VOLUMES_ROOT}/postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_POSTGRES_USER:-n8n} -d ${N8N_POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ───────────────────────────────────────────────────────────────
  # Redis — Queue Backend (Bull/BullMQ)
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: n8n_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${N8N_REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - ${N8N_VOLUMES_ROOT}/redis_data:/data
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${N8N_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ───────────────────────────────────────────────────────────────
  # n8n Main — API, Webhook, UI
  # Handles web interface, API requests, and webhook endpoints
  # Creates jobs and pushes them to Redis queue for workers
  # ───────────────────────────────────────────────────────────────
  n8n-main:
    <<: *n8n-common
    container_name: n8n_main
    ports:
      - "${N8N_PORT:-5678}:5678"
    command: start
    volumes:
      - ${N8N_VOLUMES_ROOT}/n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ───────────────────────────────────────────────────────────────
  # n8n Worker — Background Job Processor
  # Scale dynamically: docker compose up -d --scale n8n-worker=5
  # Or edit deploy.replicas below for persistent replica count
  # ───────────────────────────────────────────────────────────────
  n8n-worker:
    <<: *n8n-common
    # No container_name — required for multi-replica scaling
    command: worker --concurrency=${N8N_WORKER_CONCURRENCY:-10}
    stop_grace_period: 40s
    deploy:
      replicas: 3
    volumes:
      - ${N8N_VOLUMES_ROOT}/n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      n8n-main:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ─────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────
networks:
  n8n_network:
    driver: bridge
    name: n8n_network
